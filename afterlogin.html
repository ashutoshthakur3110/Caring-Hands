    <script>
      const tableData = async ()=>{
        const name = document.getElementById('name');
        const address = document.getElementById('address');
        const food = document.getElementById('food');
        const email = document.getElementById('email');
        const phoneNumber = document.getElementById('phoneNumber');

        const response = await fetch('http://localhost:4500/getAll',{
          method : 'GET',
          headers : {
            'Content-Type' : "application/json"
          }
        });
        const data = await response.json();
        let tableBody = document.getElementById('table-body');
        data.map((element) => {
          fillTable(element,tableBody);
        })
      }
      function fillTable(element,body)
      {
        console.log(element);
        let x1 = document.createElement('td');
        x1.innerHTML=element.name;
        let x2 = document.createElement('td');
        x2.innerHTML=element.email;
        let x3 = document.createElement('td');
        x3.innerHTML=element.mobile;
        let x4 = document.createElement('td');
        x4.innerHTML=element.food;
        // let x5 = document.createElement('td');
        // x1.innerHTML=element.address;
        let tr = document.createElement('tr');
        tr.appendChild(x1);
        tr.appendChild(x2);
        tr.appendChild(x3);
        tr.appendChild(x4);
        body.appendChild(tr);
      }
      window.onload = tableData;
    </script>
